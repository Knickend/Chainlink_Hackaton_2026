# ==========================================================================
# CRE WORKFLOW SETTINGS FILE — Confidential HTTP Price Feed
# ==========================================================================
# Uses ConfidentialHTTPClient to fetch price data with per-node request
# confidentiality. In local simulation (cre simulate), behaves like
# HTTPClient. In deployed DON execution, request details (headers, body,
# URL) are kept private per node.

# ==========================================================================
staging-settings:
  user-workflow:
    workflow-name: "conf-http-ts-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: "./secrets.production.yaml"

# ==========================================================================
production-settings:
  user-workflow:
    workflow-name: "conf-http-ts-production"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: "./secrets.production.yaml"

# ==========================================================================
test-settings:
  user-workflow:
    workflow-name: "conf-http-ts-test"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.test.json"
    secrets-path: "./secrets.test.yaml"
