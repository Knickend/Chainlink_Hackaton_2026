name: Validate env examples

on:
  push:
    paths:
      - '**/.env*'
      - 'supabase/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - '**/.env*'
      - 'supabase/**'

jobs:
  validate-env:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make check script executable
        run: chmod +x scripts/ci-check-env-example.sh

      - name: Run env example checks
        run: scripts/ci-check-env-example.sh
