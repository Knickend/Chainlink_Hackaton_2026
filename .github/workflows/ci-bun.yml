name: CI (Bun)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun (ensure >=1.0.0)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.x'

      - name: Show Bun version
        run: bun --version

      - name: Install dependencies
        run: bun install

      - name: TypeScript typecheck
        run: bunx tsc --noEmit

      - name: Lint
        run: bunx eslint "src/**/*.{ts,tsx}" || true

      - name: Run tests
        run: bunx vitest run --reporter verbose
